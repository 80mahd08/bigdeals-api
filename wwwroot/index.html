<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Ad | BigDeals</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise"></div>
    <div class="mesh-bg"></div>

    <nav id="navbar" class="scrolled">
        <div class="logo">
            <div class="logo-icon"></div>
            BIGDEALS.
        </div>
        <div class="nav-links">
            <a href="index.html">Cancel</a>
        </div>
    </nav>

    <main class="form-container">
        <!-- Auth Configuration (For Testing) -->
        <div class="form-section" style="margin-bottom: 3rem; padding-bottom: 1.5rem; border-color: var(--primary);">
            <div class="form-group">
                <label for="jwt-token" style="color: var(--primary);">Authentication Token (JWT)</label>
                <input type="text" id="jwt-token" class="form-control" placeholder="Paste your Bearer token here..." style="font-family: monospace; font-size: 0.8rem; border-color: var(--primary); background: rgba(99,102,241,0.05);">
            </div>
        </div>

        <div class="form-header">
            <h1 class="text-gradient" style="font-size: 2.5rem; margin-bottom: 0.5rem;">CREATE ANNOUNCEMENT</h1>
            <p style="color: var(--text-muted);">List your item in our premium marketplace.</p>
        </div>

        <form id="annonce-form">
            <!-- Basic Information -->
            <div class="form-section">
                <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem; color: var(--primary);">Basic Info</h2>
                
                <div class="form-group">
                    <label for="IdCategorie">Category</label>
                    <select id="IdCategorie" name="IdCategorie" class="form-control" required>
                        <option value="">Select a category...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="Titre">Title</label>
                    <input type="text" id="Titre" name="Titre" class="form-control" placeholder="e.g. BMW X5 2022 - État Neuf" required>
                </div>

                <div class="form-group">
                    <label for="Description">Description</label>
                    <textarea id="Description" name="Description" class="form-control" rows="4" placeholder="Describe your item in detail..." required></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="Prix">Price (DZD)</label>
                        <input type="number" id="Prix" name="Prix" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="Localisation">Localisation</label>
                        <input type="text" id="Localisation" name="Localisation" class="form-control" placeholder="e.g. TUNIS, ALGER" required>
                    </div>
                </div>
            </div>

            <!-- Dynamic Attributes (Injected based on Category) -->
            <div id="dynamic-section" class="form-section" style="display: none;">
                <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem; color: var(--secondary);">Category Details</h2>
                <div id="dynamic-attributes">
                    <!-- Dynamic fields go here -->
                </div>
            </div>

            <!-- Image Upload -->
            <div class="form-section" style="border-bottom: none;">
                <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem; color: var(--accent);">Gallery</h2>
                <div class="upload-zone" id="upload-zone">
                    <i data-lucide="image-plus" style="width: 48px; height: 48px; margin-bottom: 1rem; color: var(--text-muted);"></i>
                    <p style="font-weight: 600;">Drag & Drop images or <span class="text-gradient">Browse</span></p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Maximum 8 images. WebP, JPG, or PNG.</p>
                    <input type="file" id="Images" name="Images" multiple accept="image/*" style="display: none;">
                </div>
                <div class="preview-grid" id="preview-grid"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Publish Announcement</button>
        </form>
    </main>

    <div id="toast" style="position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 12px; background: var(--glass); border: 1px solid var(--border); display: none; z-index: 1000; transform: translateY(100px); transition: all 0.4s;">
        <span id="toast-msg"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
